<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Girassol&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Girassol', serif;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background:
                radial-gradient(circle at top, #222, #0a0a0a);
        }

        /* MAIN PANEL */

        .modal {
            width: 78%;
            height: 82vh;

            display: flex;

            border-radius: 30px;
            overflow: hidden;

            background:
                linear-gradient(145deg,
                    #0f0f0f,
                    #181818,
                    #101010);

            border: 1px solid rgba(255, 255, 255, .08);

            box-shadow:
                0 0 35px rgba(255, 180, 0, .12),
                0 25px 70px rgba(0, 0, 0, .65);

            backdrop-filter: blur(10px);
        }

        /* LEFT SIDE */

        .modal-left {
            flex: 1;

            padding: 55px;

            display: flex;
            flex-direction: column;
            justify-content: center;

            color: white;
        }

        /* TITLE */

        .modal-left h2 {
            text-align: center;
            font-size: 2.6rem;
            letter-spacing: 4px;

            color: #f4d28b;

            margin-bottom: 12px;
        }

        /* divider */

        .modal-left h2::after {
            content: "";

            display: block;
            height: 1px;

            background: rgba(255, 191, 73, .25);

            margin-top: 16px;
        }

        /* FORM */

        .modal-left form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-left label {
            color: #d8d8d8;
            letter-spacing: 1px;
        }

        /* INPUTS */

        .modal-left input {
            padding: 16px;

            border-radius: 15px;

            border:
                1px solid rgba(255, 191, 73, .18);

            background:
                rgba(255, 255, 255, .05);

            color: white;

            font-size: 1rem;
            font-family: Girassol;

            outline: none;

            transition: .3s;
        }

        .modal-left input::placeholder {
            color: rgba(255, 255, 255, .35);
        }

        /* glow focus */

        .modal-left input:focus {
            border-color: #dca13d;

            box-shadow:
                0 0 18px rgba(255, 180, 0, .25);
        }

        /* BUTTON */

        .submit-btn {
            margin-top: 22px;

            padding: 18px;

            border: none;
            border-radius: 18px;

            cursor: pointer;

            font-size: 1rem;
            font-family: Girassol;
            letter-spacing: 2px;

            background:
                linear-gradient(90deg,
                    #7a4a00,
                    #dca13d,
                    #8c5600);

            color: black;

            transition: .3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);

            box-shadow:
                0 0 22px rgba(255, 180, 0, .35);

            filter: brightness(1.05);
        }

        /* BACK BUTTON */

        .back-btn {
            margin-top: 15px;

            background: transparent;

            border: none;

            color: #dca13d;

            font-size: 1rem;
            font-family: Girassol;

            cursor: pointer;

            transition: .3s;
        }

        .back-btn:hover {
            transform: translateX(-6px);
        }

        /* RIGHT SIDE */

        .modal-right {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .modal-right::after {
            content: "";
            position: absolute;
            inset: 0;

            background:
                linear-gradient(to left,
                    rgba(0, 0, 0, .1),
                    rgba(0, 0, 0, .35));

            z-index: 2;
        }

        /* IMAGES */

        .modal-right img {
            width: 100%;
            height: 100%;

            object-fit: cover;

            position: absolute;
            top: 0;
            left: 0;

            opacity: 0;

            transition:
                opacity 1s ease-in-out,
                transform 6s ease;
        }

        /* active image */

        .modal-right img.active {
            opacity: 1;
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <!-- Modal -->
    <div class="modal">
        <!-- Left Column -->
        <div class="modal-left">
            <h2>Create Profile</h2>
            <form onsubmit="handleFormSubmit(event)">
                <label for="username">Driver ID:</label>
                <input type="text" id="username" name="username" required autocomplete="off">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required autocomplete="off">
                <label for="password">Security Key:</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
                <label for="confirm-password">Confirm Security Key:</label>
                <input type="password" id="confirm-password" name="confirm-password" required
                    autocomplete="new-password">
                <button type="submit" class="submit-btn">JOIN THE GARAGE</button>
            </form>
            <button class="back-btn" onclick="goBack()">Back</button>
        </div>

        <!-- Right Column -->
        <div class="modal-right">
            <img src="/images//AS-CP.JPG" alt="Car 1" class="active">
            <img src="/images//Bentley-CP.JPG" alt="Car 2">
            <img src="/images//RR-CP.JPG" alt="Car 3">
            <img src="/images//Benz-CP.JPG" alt="Car 4">
            <img src="/images//Ferrari-CP.JPG" alt="Car 5">
            <img src="/images//Porsche-CP.JPG" alt="Car 6">
            <img src="/images//Jaguar-CP.JPG" alt="Car 7">
        </div>
    </div>

    <script>
        // Back Button Functionality
        function goBack() {
            window.location.href = '/LogIn.html'; // Navigate back to login page
        }

        // Image Slideshow
        const images = document.querySelectorAll('.modal-right img');
        let currentIndex = 0;

        setInterval(() => {
            images[currentIndex].classList.remove('active');
            currentIndex = (currentIndex + 1) % images.length;
            images[currentIndex].classList.add('active');
        }, 2000); // Change image every 3 seconds

        function handleFormSubmit(event) {
            event.preventDefault();

            const username =
                document.getElementById("username").value;

            const password =
                document.getElementById("password").value;

            const confirmPassword =
                document.getElementById("confirm-password").value;

            if (password !== confirmPassword) {
                alert("Security Keys do not match.");
                return;
            }

            // save user in browser
            localStorage.setItem("gearheadsUser", username);
            localStorage.setItem("gearheadsPassword", password);

            alert("Profile created successfully!");

            window.location.href = "/LogIn.html";
        }
    </script>
</body>

</html>
